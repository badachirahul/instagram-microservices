spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5433/notificationdb
    username: insta
    password: insta
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service

server:
  port: 8083

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me}
