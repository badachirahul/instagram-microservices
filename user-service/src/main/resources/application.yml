spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5433/userdb
    username: insta
    password: insta
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8081

app:
  jwt:
    # Shared HS256 secret — see docs/jwt-contract.md. Same value in every service.
    secret: ${JWT_SECRET:I0KQjwMx0u/vwwt0/UQ2bu9uePtTQm8aysfPmd/OucvzNt7sDrNwVLeTcJPyNuMu}
