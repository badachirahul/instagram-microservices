server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      # Global CORS — the React frontend (localhost:5173) may call the gateway
      # with credentials (cookies / Authorization headers).
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # ---- User service (:8081) ----
        - id: user-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: user-users
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        # ---- Post service (:8082) ----
        - id: post-posts
          uri: http://localhost:8082
          predicates:
            - Path=/api/posts/**
        - id: post-feed
          uri: http://localhost:8082
          predicates:
            - Path=/api/feed

        # ---- Notification service (:8083) ----
        - id: notification
          uri: http://localhost:8083
          predicates:
            - Path=/api/notifications/**
